# Nginx reverse proxy for Hisab247 API (Docker backend on 127.0.0.1:3000)
#
# Install:
#   sudo cp deploy/nginx/api.hisab247.com.conf /etc/nginx/sites-available/api.hisab247.com
#   sudo ln -sf /etc/nginx/sites-available/api.hisab247.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d api.hisab247.com

upstream hisab247_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.hisab247.com;

    # Certbot will add HTTPS redirect after SSL is issued.
    location / {
        proxy_pass http://hisab247_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/v1/health {
        proxy_pass http://hisab247_backend;
        access_log off;
    }
}
